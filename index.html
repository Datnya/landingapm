<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APM Group | Consultoría y Formación</title>
    <meta name="description"
        content="Potenciamos organizaciones con normas internacionales, sostenibilidad e innovación.">
    <!-- Google Fonts: Montserrat (headings) + Poppins (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div id="root"></div>

    <!-- Hidden form for Netlify detection -->
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
        <input type="text" name="nombre" />
        <input type="text" name="cargo" />
        <input type="email" name="email" />
        <input type="tel" name="telefono" />
        <input type="text" name="ciudad" />
        <input type="text" name="ruc" />
        <input type="text" name="empresa" />
        <input type="text" name="industria" />
        <input type="text" name="servicio" />
        <input type="text" name="como_se_entero" />
        <textarea name="mensaje"></textarea>
    </form>

    <script type="module" src="/src/main.tsx"></script>
</body>

</html>
