<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensaje Enviado | APM Group</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #B2C535;
            --secondary: #171717;
            --surface: #F8F9FA;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--surface);
            color: var(--secondary);
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Abstract Backgrounds */
        .bg-element {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 0;
            pointer-events: none;
        }

        .bg-element-1 {
            top: 0;
            right: 0;
            width: 400px;
            height: 400px;
            background-color: rgba(178, 197, 53, 0.15);
            transform: translate(50%, -50%);
        }

        .bg-element-2 {
            bottom: 0;
            left: 0;
            width: 400px;
            height: 400px;
            background-color: rgba(178, 197, 53, 0.15);
            transform: translate(-50%, 50%);
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            background: white;
            padding: 4rem 3rem;
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
            max-width: 650px;
            width: 90%;
            border: 1px solid rgba(178, 197, 53, 0.2);
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .icon-wrapper {
            width: 100px;
            height: 100px;
            background: rgba(178, 197, 53, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            opacity: 0;
            transform: scale(0.5);
            animation: bounceIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.3s forwards;
        }

        .icon-wrapper svg {
            width: 50px;
            height: 50px;
            color: var(--primary);
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -1px;
            text-transform: uppercase;
            margin-bottom: 1rem;
            line-height: 1.2;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s ease forwards 0.5s;
        }

        p {
            font-size: 1.1rem;
            color: rgba(23, 23, 23, 0.7);
            font-weight: 500;
            line-height: 1.6;
            margin-bottom: 2.5rem;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s ease forwards 0.7s;
        }

        p strong {
            color: var(--primary);
            font-weight: 700;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background-color: var(--secondary);
            color: white;
            padding: 1.2rem 2.5rem;
            border-radius: 16px;
            font-size: 0.85rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s ease forwards 0.9s;
        }

        .btn:hover {
            background-color: var(--primary);
            color: var(--secondary);
            transform: scale(1.05) translateY(-2px) !important;
            box-shadow: 0 15px 40px rgba(178, 197, 53, 0.4);
        }

        .btn svg {
            width: 20px;
            height: 20px;
            transition: transform 0.3s ease;
        }

        .btn:hover svg {
            transform: translateX(-5px);
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes bounceIn {
            0% {
                opacity: 0;
                transform: scale(0.3);
            }

            50% {
                opacity: 1;
                transform: scale(1.05);
            }

            70% {
                transform: scale(0.9);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            p {
                font-size: 1rem;
            }

            .container {
                padding: 3rem 2rem;
            }
        }
    </style>
</head>

<body>
    <div class="bg-element bg-element-1"></div>
    <div class="bg-element bg-element-2"></div>

    <div class="container">
        <div class="icon-wrapper">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
        </div>

        <h1>¡Mensaje enviado con éxito!</h1>

        <p>
            Gracias por contactar a <strong>APM Group</strong>. Nuestro equipo de especialistas revisará tu solicitud y
            te contactará en breve.
        </p>

        <a href="/" class="btn">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18">
                </path>
            </svg>
            Volver al inicio
        </a>
    </div>
</body>

</html>
